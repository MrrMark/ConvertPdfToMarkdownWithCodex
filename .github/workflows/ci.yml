name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Schema contract
        run: python scripts/export_output_schema.py --check

      - name: Docs/output contract
        run: python -m pytest tests/test_docs_examples.py tests/test_output_schema_contract.py -q

      - name: Test
        run: python -m pytest

      - name: CLI smoke
        run: python -m pdf2md --help
